<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ecommerce Home</title>
</head>
<body>
    <h1>Product List</h1>

    <div th:each="p : ${products}">
        <h3 th:text="${p.name}"></h3>
        <p th:text="${p.price}"></p>
        <a th:href="@{'/product/' + ${p.id}}">View Detail</a>
    </div>

    <hr>
    <p>Cart items: <span th:text="${cart != null ? cart.totalQuantity : 0}"></span></p>
</body>
</html>
